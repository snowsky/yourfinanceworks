services:
  # Master PostgreSQL database for tenant management
  postgres-master:
    image: postgres:15
    container_name: invoice_app_postgres_master
    environment:
      POSTGRES_DB: invoice_master
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      # Allow multiple databases to be created
      POSTGRES_MULTIPLE_DATABASES: "true"
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./api/scripts/init-master-postgres.sql:/docker-entrypoint-initdb.d/init-master-postgres.sql
    networks:
      - invoice_app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # API service with multi-tenant support
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: invoice_app_api
    environment:
      # Master database for tenant management
      - DATABASE_URL=postgresql://postgres:password@postgres-master:5432/invoice_master
      # JWT settings
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # Multi-tenant configuration
      - MULTITENANT_MODE=database_per_tenant
      - TENANT_DATABASE_PREFIX=tenant_
      - MASTER_DATABASE_HOST=postgres-master
      - MASTER_DATABASE_PORT=5432
      - MASTER_DATABASE_USER=postgres
      - MASTER_DATABASE_PASSWORD=password
      # Slack Integration
      - SLACK_VERIFICATION_TOKEN=${SLACK_VERIFICATION_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      # Other settings
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres-master:
        condition: service_healthy
    networks:
      - invoice_app_network
    restart: unless-stopped
    volumes:
      - ./api:/app
      - /app/__pycache__
      - /app/venv
      - ./docker/wait-for-it.sh:/wait-for-it.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    command: >
      sh -c "/wait-for-it.sh postgres-master:5432 -- \
        echo 'Initializing database and running migrations...' && \
        python db_init.py && \
        echo 'Setting up Alembic migrations...' && \
        python scripts/manage_migrations.py setup || echo 'Migration setup completed or already done' && \
        echo 'Starting API server...' && \
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # UI service
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: invoice_app_ui
    environment:
      - VITE_API_URL=/api/v1
    depends_on:
      api:
        condition: service_healthy
    networks:
      - invoice_app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: invoice_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - ui
    networks:
      - invoice_app_network
    restart: unless-stopped

  # Ollama AI service
  ollama:
    image: ollama/ollama
    container_name: invoice_app_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - invoice_app_network
    restart: unless-stopped

  # Database backup service (optional)
  backup:
    image: postgres:15
    container_name: invoice_app_backup
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: postgres-master
      POSTGRES_PORT: 5432
    volumes:
      - ./backups:/backups
      - ./api/scripts/backup-tenants.sh:/backup-tenants.sh
    networks:
      - invoice_app_network
    restart: "no"
    profiles:
      - backup
    command: ["sh", "-c", "chmod +x /backup-tenants.sh && /backup-tenants.sh"]

volumes:
  postgres_master_data:
  ollama_data:

networks:
  invoice_app_network:
    driver: bridge 