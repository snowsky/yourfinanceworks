version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: invoice_app_postgres
    environment:
      POSTGRES_DB: invoice_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - invoice_app_network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: invoice_app_api
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/invoice_app
      - SECRET_KEY=your-secret-key-here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - invoice_app_network
    restart: unless-stopped
    volumes:
      - ./api:/app
      - /app/__pycache__

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: invoice_app_ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - invoice_app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  invoice_app_network:
    driver: bridge 