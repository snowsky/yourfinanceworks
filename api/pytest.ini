[tool:pytest]
# Pytest configuration for comprehensive reporting test suite

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    performance: Performance and benchmark tests
    security: Security and access control tests
    e2e: End-to-end workflow tests
    slow: Tests that take a long time to run
    requires_db: Tests that require database connection
    requires_external: Tests that require external services

# Test timeout (in seconds)
timeout = 300

# Minimum version requirements
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy.*

# Coverage options (if pytest-cov is installed)
# addopts = --cov=services --cov=routers --cov-report=html --cov-report=term-missing

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto

# JSON report (if pytest-json-report is installed)
# addopts = --json-report --json-report-file=test_results.json