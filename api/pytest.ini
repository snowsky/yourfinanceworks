[tool:pytest]
testpaths = tests
norecursedirs = scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = --cov=tests --cov-report=html --cov-report=term-missing

[coverage:run]
source = .
omit = 
    tests/*
    scripts/*
    venv/*
    __pycache__/*
    .pytest_cache/*