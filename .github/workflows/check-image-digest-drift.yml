name: Check Image Digest Drift

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Choose check to enforce the current baseline or accept to rewrite the baseline to current digests.
        required: true
        default: check
        type: choice
        options:
          - check
          - accept

permissions:
  contents: write

jobs:
  check-image-digest-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Check or accept current image digests
        id: drift
        uses: snowsky/what-a-trivy-hack/.github/actions/check-image-digest-drift@main
        with:
          lock-file: .github/image-digest-lock.json
          mode: ${{ github.event.inputs.mode || 'check' }}

      - name: Commit updated lock file
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'accept' && steps.drift.outputs.updated-lock-file == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/image-digest-lock.json
          git commit -m "chore: refresh image digest lock file"
          git push
