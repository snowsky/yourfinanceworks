apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: invoice-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z kafka.invoice-app.svc.cluster.local 9092; do echo waiting for kafka; sleep 2; done;
      containers:
        - name: ocr-worker
          image: invoice-app-ocr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:password@postgres-master:5432/invoice_master
            - name: MULTITENANT_MODE
              value: database_per_tenant
            - name: TENANT_DATABASE_PREFIX
              value: tenant_
            - name: MASTER_DATABASE_HOST
              value: postgres-master
            - name: MASTER_DATABASE_PORT
              value: "5432"
            - name: MASTER_DATABASE_USER
              value: postgres
            - name: MASTER_DATABASE_PASSWORD
              value: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_OCR_TOPIC
              value: expenses_ocr
            - name: KAFKA_OCR_GROUP
              value: invoice-app-ocr
            - name: LOG_LEVEL
              value: INFO
            - name: OLLAMA_API_BASE
              value: http://host.docker.internal:11434/api/generate
            - name: LLM_MODEL_EXPENSES
              value: llama3.2-vision:11b
          command: ["python","-m","workers.ocr_consumer"]

