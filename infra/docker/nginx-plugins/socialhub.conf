# yfw-socialhub sidecar plugin — nginx routing.
# Activated and refined by Antigravity to fix MIME type errors.

# API traffic: /api/v1/socialhub/* → plugin_socialhub backend
location /api/v1/socialhub/ {
    set $upstream_socialhub plugin_socialhub:8000;
    proxy_pass http://$upstream_socialhub;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 120s;
}

# UI assets: /plugins/socialhub/ → plugin_socialhub_ui frontend
location /plugins/socialhub/ {
    set $upstream_socialhub_ui plugin_socialhub_ui:80;
    
    # Removed rewrite to allow Vite's 'base' path to match the internal structure.
    proxy_pass http://$upstream_socialhub_ui;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Ensure MIME types are preserved correctly
    proxy_intercept_errors on;
}

# Add a redirect for direct navigation to the socialhub route
# to ensure it always lands in the main UI's router context.
location = /socialhub {
    return 301 $scheme://$http_host/socialhub/;
}
