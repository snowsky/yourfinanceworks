# yfw-statement-tools sidecar plugin — nginx routing.

# API traffic: /api/v1/statement-tools/* → plugin_statement_tools backend
location /api/v1/statement-tools/ {
    set $upstream_stmt plugin_statement_tools:8000;
    proxy_pass http://$upstream_stmt;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 120s;
}

# UI assets: /plugins/statement-tools/ → plugin_statement_tools_ui frontend
location /plugins/statement-tools/ {
    set $upstream_stmt_ui plugin_statement_tools_ui:80;

    # Strip the /plugins/statement-tools/ prefix — the internal nginx
    # serves from root /usr/share/nginx/html/ (dist/assets etc.)
    rewrite ^/plugins/statement-tools/(.*)$ /$1 break;

    proxy_pass http://$upstream_stmt_ui;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_intercept_errors on;
}
