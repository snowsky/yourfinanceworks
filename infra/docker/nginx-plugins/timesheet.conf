# yfw-timesheet sidecar plugin — nginx routing.

# API traffic: /api/v1/timesheet/* → plugin_timesheet backend
location /api/v1/timesheet/ {
    set $upstream_timesheet plugin_timesheet:8000;
    proxy_pass http://$upstream_timesheet;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 300s;
}

# UI assets: /plugins/timesheet/ → plugin_timesheet_ui frontend
location /plugins/timesheet/ {
    set $upstream_timesheet_ui plugin_timesheet_ui:80;

    # Strip the /plugins/timesheet/ prefix because plugin UI serves from /
    rewrite ^/plugins/timesheet/(.*)$ /$1 break;

    proxy_pass http://$upstream_timesheet_ui;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_intercept_errors on;
}
