server {
    listen 80;
    server_name localhost;
    # Allow larger uploads (adjust as needed)
    client_max_body_size 100M;

    # API routes
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass Authorization header to API
        proxy_set_header Authorization $http_authorization;
        # Fix redirect issues by preserving the port
        proxy_set_header X-Forwarded-Port $server_port;
        # Handle redirects properly
        proxy_redirect http://api:8000/ $scheme://$host:$server_port/;
        # Improve handling for large uploads/long requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        # Optionally disable request buffering for streaming uploads
        # proxy_request_buffering off;
    }

    # Health endpoint
    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # WebSocket support for development server hot reload
    location /ws {
        proxy_pass http://ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # UI routes (everything else) with WebSocket upgrade support
    location / {
        proxy_pass http://ui:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}

# Map for WebSocket connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}