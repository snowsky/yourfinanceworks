# Default values for invoice-app Helm chart

# Global settings
global:
  namespace: invoice-app
  imagePullPolicy: IfNotPresent

# PostgreSQL dependency settings
postgresql:
  enabled: true
  auth:
    postgresPassword: "password"
    username: "postgres"
    password: "password"
    database: "invoice_master"
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 5Gi
    initdb:
      scripts:
        init-master-postgres.sql: |
          -- Initialize master database for multi-tenant invoice app
          -- This script runs when the PostgreSQL container starts

          -- Create the master database if it doesn't exist
          SELECT 'CREATE DATABASE invoice_master'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'invoice_master')\gexec

          -- Connect to the master database
          \c invoice_master;

          -- Create extensions if they don't exist
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

          -- Create the tenants table with all required columns
          CREATE TABLE IF NOT EXISTS tenants (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              subdomain VARCHAR(255) UNIQUE,
              is_active BOOLEAN DEFAULT TRUE,

              -- Company details
              email VARCHAR(255),
              phone VARCHAR(255),
              address TEXT,
              tax_id VARCHAR(255),
              company_logo_url VARCHAR(255),
              enable_ai_assistant BOOLEAN DEFAULT FALSE,

              -- Currency settings
              default_currency VARCHAR(10) DEFAULT 'USD' NOT NULL,

              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Create the master_users table with all required columns
          CREATE TABLE IF NOT EXISTS master_users (
              id SERIAL PRIMARY KEY,
              email VARCHAR(255) UNIQUE NOT NULL,
              hashed_password VARCHAR(255) NOT NULL,
              is_active BOOLEAN DEFAULT TRUE NOT NULL,
              is_superuser BOOLEAN DEFAULT FALSE NOT NULL,
              is_verified BOOLEAN DEFAULT FALSE NOT NULL,
              theme VARCHAR(50) DEFAULT 'system',
              tenant_id INTEGER REFERENCES tenants(id) NOT NULL,
              role VARCHAR(50) DEFAULT 'user',
              first_name VARCHAR(255),
              last_name VARCHAR(255),
              google_id VARCHAR(255) UNIQUE,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Create indexes
          CREATE INDEX IF NOT EXISTS idx_tenants_subdomain ON tenants(subdomain);
          CREATE INDEX IF NOT EXISTS idx_master_users_email ON master_users(email);
          CREATE INDEX IF NOT EXISTS idx_master_users_tenant_id ON master_users(tenant_id);

# External PostgreSQL configuration (used when postgresql.enabled is false)
externalPostgresql:
  host: ""
  port: 5432
  username: "postgres"
  password: "password"
  database: "invoice_master"
  sslmode: "require"

# API service configuration
api:
  enabled: true
  image:
    repository: invoice-app-api
    tag: "latest"
  replicas: 1
  port: 8000
  env:
    SECRET_KEY: "your-secret-key-here"
    ALGORITHM: "HS256"
    ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    UI_BASE_URL: "http://localhost:8080"
    MULTITENANT_MODE: "database_per_tenant"
    TENANT_DATABASE_PREFIX: "tenant_"
    # Database configuration - will be set dynamically based on postgresql.enabled
    MASTER_DATABASE_HOST: "{{- if .Values.postgresql.enabled }}postgres-master{{- else }}{{ .Values.externalPostgresql.host }}{{- end }}"
    MASTER_DATABASE_PORT: "{{- if .Values.postgresql.enabled }}5432{{- else }}{{ .Values.externalPostgresql.port }}{{- end }}"
    MASTER_DATABASE_USER: "{{- if .Values.postgresql.enabled }}postgres{{- else }}{{ .Values.externalPostgresql.username }}{{- end }}"
    MASTER_DATABASE_PASSWORD: "{{- if .Values.postgresql.enabled }}password{{- else }}{{ .Values.externalPostgresql.password }}{{- end }}"
    # Kafka configuration - will be set dynamically based on kafka.enabled
    KAFKA_BOOTSTRAP_SERVERS: "{{- if .Values.kafka.enabled }}kafka:9092{{- else }}{{ .Values.externalKafka.bootstrapServers }}{{- end }}"
    SLACK_VERIFICATION_TOKEN: ""
    SLACK_BOT_TOKEN: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    DEBUG: "False"
    LOG_LEVEL: "INFO"
    KAFKA_OCR_TOPIC: "expenses_ocr"
    KAFKA_OCR_GROUP: "invoice-app-ocr"
  secrets:
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""

# UI service configuration
ui:
  enabled: true
  image:
    repository: invoice-app-ui
    tag: "latest"
  replicas: 1
  port: 8080
  env:
    VITE_API_URL: "/api/v1"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: invoice-app.local
      paths:
        - path: /api/
          pathType: Prefix
          service:
            name: api
            port: 8000
        - path: /health
          pathType: Prefix
          service:
            name: api
            port: 8000
        - path: /
          pathType: Prefix
          service:
            name: ui
            port: 8080

# Kafka dependency settings
kafka:
  enabled: false
  # Use custom Confluent Platform Kafka image (optional)
  useConfluentImage: false
  confluentImage:
    repository: confluentinc/cp-kafka
    tag: "7.6.1"
  replicaCount: 1
  storage: 5Gi
  # Bitnami dependency configuration (default)
  listeners:
    client:
      containerPort: 9092
    controller:
      containerPort: 9093
    interbroker:
      containerPort: 9094
  persistence:
    enabled: true
    size: 5Gi
  zookeeper:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi

# External Kafka configuration (used when kafka.enabled is false)
externalKafka:
  bootstrapServers: ""
  securityProtocol: "PLAINTEXT"
  saslMechanism: ""
  saslUsername: ""
  saslPassword: ""
  sslCaLocation: ""

# OCR Worker configuration (optional)
ocrWorker:
  enabled: false
  image:
    repository: invoice-app-ocr
    tag: "latest"
  replicas: 1
  env:
    LOG_LEVEL: "INFO"
    OLLAMA_API_BASE: "http://host.docker.internal:11434"
    LLM_MODEL_EXPENSES: "llama3.2-vision:11b"

# Kafdrop configuration (optional)
kafdrop:
  enabled: false
  image:
    repository: obsidiandynamics/kafdrop
    tag: "4.0.2"
  replicas: 1
  port: 9000