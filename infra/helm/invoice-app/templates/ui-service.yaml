{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ include "invoice-app.namespace" . }}
  labels:
    {{- include "invoice-app.labels" . | nindent 4 }}
    app: ui
spec:
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ include "invoice-app.namespace" . }}
  labels:
    {{- include "invoice-app.labels" . | nindent 4 }}
    app: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: {{ include "invoice-app.image" (dict "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag) }}
          imagePullPolicy: {{ include "invoice-app.imagePullPolicy" . }}
          env:
            - name: VITE_API_URL
              value: {{ .Values.ui.env.VITE_API_URL | quote }}
          ports:
            - containerPort: {{ .Values.ui.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}