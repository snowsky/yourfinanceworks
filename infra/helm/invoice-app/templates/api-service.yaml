{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ include "invoice-app.namespace" . }}
  labels:
    {{- include "invoice-app.labels" . | nindent 4 }}
    app: api
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ include "invoice-app.namespace" . }}
  labels:
    {{- include "invoice-app.labels" . | nindent 4 }}
    app: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      {{- if or (and .Values.postgresql.enabled) (and .Values.kafka.enabled) }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z postgres-master.{{ include "invoice-app.namespace" . }}.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done;
        {{- end }}
        {{- if .Values.kafka.enabled }}
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z kafka.{{ include "invoice-app.namespace" . }}.svc.cluster.local 9092; do echo waiting for kafka; sleep 2; done;
        {{- end }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "invoice-app.image" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag) }}
          imagePullPolicy: {{ include "invoice-app.imagePullPolicy" . }}
          env:
            - name: DATABASE_URL
              value: postgresql://{{ .Values.api.env.MASTER_DATABASE_USER }}:{{ .Values.api.env.MASTER_DATABASE_PASSWORD }}@{{ .Values.api.env.MASTER_DATABASE_HOST }}:{{ .Values.api.env.MASTER_DATABASE_PORT }}/{{- if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.database }}{{- else }}{{ .Values.externalPostgresql.database }}{{- end }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SECRET_KEY
            - name: ALGORITHM
              value: {{ .Values.api.env.ALGORITHM | quote }}
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: {{ .Values.api.env.ACCESS_TOKEN_EXPIRE_MINUTES | quote }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: UI_BASE_URL
              value: {{ .Values.api.env.UI_BASE_URL | quote }}
            - name: MULTITENANT_MODE
              value: {{ .Values.api.env.MULTITENANT_MODE | quote }}
            - name: TENANT_DATABASE_PREFIX
              value: {{ .Values.api.env.TENANT_DATABASE_PREFIX | quote }}
            - name: MASTER_DATABASE_HOST
              value: {{ .Values.api.env.MASTER_DATABASE_HOST | quote }}
            - name: MASTER_DATABASE_PORT
              value: {{ .Values.api.env.MASTER_DATABASE_PORT | quote }}
            - name: MASTER_DATABASE_USER
              value: {{ .Values.api.env.MASTER_DATABASE_USER | quote }}
            - name: MASTER_DATABASE_PASSWORD
              value: {{ .Values.api.env.MASTER_DATABASE_PASSWORD | quote }}
            - name: SLACK_VERIFICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_VERIFICATION_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_BOT_TOKEN
            - name: SLACK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_CLIENT_ID
            - name: SLACK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_CLIENT_SECRET
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_SIGNING_SECRET
            - name: DEBUG
              value: {{ .Values.api.env.DEBUG | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.env.LOG_LEVEL | quote }}
            {{- if or .Values.kafka.enabled .Values.externalKafka.bootstrapServers }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.api.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
            - name: KAFKA_OCR_TOPIC
              value: {{ .Values.api.env.KAFKA_OCR_TOPIC | quote }}
            - name: KAFKA_OCR_GROUP
              value: {{ .Values.api.env.KAFKA_OCR_GROUP | quote }}
            {{- if .Values.externalKafka.securityProtocol }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.externalKafka.securityProtocol | quote }}
            {{- end }}
            {{- if .Values.externalKafka.saslMechanism }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.externalKafka.saslMechanism | quote }}
            {{- end }}
            {{- if .Values.externalKafka.saslUsername }}
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: KAFKA_SASL_USERNAME
            {{- end }}
            {{- if .Values.externalKafka.saslPassword }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: KAFKA_SASL_PASSWORD
            {{- end }}
            {{- if .Values.externalKafka.sslCaLocation }}
            - name: KAFKA_SSL_CA_LOCATION
              value: {{ .Values.externalKafka.sslCaLocation | quote }}
            {{- end }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          command: ["/bin/sh","-c"]
          args:
            - >-
              echo 'Initializing database and running migrations...' &&
              python db_init.py &&
              echo 'Setting up Alembic migrations...' &&
              python scripts/manage_migrations.py setup || echo 'Migration setup completed or already done' &&
              echo 'Starting API server...' &&
              uvicorn main:app --host 0.0.0.0 --port {{ .Values.api.port }}
{{- end }}