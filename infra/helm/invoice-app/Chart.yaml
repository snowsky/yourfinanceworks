apiVersion: v2
name: yourfinanceworks
description: A Helm chart for YourFinanceWORKS with API, UI
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "15.5.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: kafka
    version: "30.1.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled